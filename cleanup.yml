name: Quarterly Backup Cleanup

on:
  schedule:
    - cron: '0 15 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Delete backups from 2 quarters ago
        run: |
          MONTH=$(TZ='Asia/Seoul' date '+%m')
          YEAR=$(TZ='Asia/Seoul' date '+%Y')
          CURRENT_Q=$(( (10#$MONTH - 1) / 3 + 1 ))
          TARGET_Q=$(( CURRENT_Q - 2 ))
          TARGET_YEAR=$YEAR
          if [ $TARGET_Q -le 0 ]; then
            TARGET_Q=$(( TARGET_Q + 4 ))
            TARGET_YEAR=$(( YEAR - 1 ))
          fi
          case $TARGET_Q in
            1) MONTHS="01 02 03" ;;
            2) MONTHS="04 05 06" ;;
            3) MONTHS="07 08 09" ;;
            4) MONTHS="10 11 12" ;;
          esac
          echo "삭제 대상: ${TARGET_YEAR}년 ${TARGET_Q}분기"
          for M in $MONTHS; do
            for DIR in backups/${TARGET_YEAR}-${M}-*/; do
              if [ -d "$DIR" ]; then
                echo "삭제: $DIR"
                rm -rf "$DIR"
              fi
            done
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A backups/
          git diff --staged --quiet && echo "skip" || (git commit -m "cleanup: 분기 백업 정리" && git push)
