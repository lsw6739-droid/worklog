<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<title>공수 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root {
  --bg:#0a1628;--surface:#0f2040;--surface2:#152a50;--surface3:#1a3060;
  --border:#1e3a6e;--border2:#254a8a;
  --accent:#00d4ff;--accent2:#00ff9d;--accent3:#7c3aed;
  --danger:#ff4757;--warn:#ffa502;--pink:#ff6b9d;
  --text:#e8f4ff;--text2:#7aa8d4;--text3:#3d6a9e;
  --radius:14px;--shadow:0 8px 40px rgba(0,0,0,0.5);
  --glow:0 0 30px rgba(0,212,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* BG GRID */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* HEADER */
.db-header{position:sticky;top:0;z-index:100;background:rgba(10,22,40,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.db-title{display:flex;align-items:center;gap:12px}
.db-logo{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:8px;padding:4px 10px}
.db-name{font-size:15px;font-weight:700}
.db-sub{font-size:11px;color:var(--text2)}
.db-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.db-back{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.db-back:hover{border-color:var(--accent);color:var(--accent)}

/* FILTER BAR */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:57px;z-index:99;backdrop-filter:blur(10px)}
.filter-section{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:rgba(0,212,255,0.15);border-color:var(--accent);color:var(--accent)}
.filter-chip.active-member{background:rgba(0,255,157,0.15);border-color:var(--accent2);color:var(--accent2)}
.filter-chip.active-cat{background:rgba(124,58,237,0.15);border-color:var(--accent3);color:#a78bfa}
.filter-chip.active-diff-low{background:rgba(0,255,157,0.15);border-color:var(--accent2);color:var(--accent2)}
.filter-chip.active-diff-mid{background:rgba(255,165,2,0.15);border-color:var(--warn);color:var(--warn)}
.filter-chip.active-diff-high{background:rgba(255,71,87,0.15);border-color:var(--danger);color:var(--danger)}
.filter-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
select.filter-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;font-size:11px;font-family:inherit;cursor:pointer;-webkit-appearance:none}
select.filter-select:focus{outline:none;border-color:var(--accent)}
.clear-btn{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--danger);background:rgba(255,71,87,0.1);color:var(--danger);transition:all .2s}
.clear-btn:hover{background:rgba(255,71,87,0.2)}
.period-btn{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s;white-space:nowrap}
.period-btn:hover{border-color:var(--accent);color:var(--accent)}
.period-btn.active{background:rgba(0,212,255,0.15);border-color:var(--accent);color:var(--accent)}
input.date-range{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 8px;font-size:11px;font-family:inherit;cursor:pointer;-webkit-appearance:none;color-scheme:dark}
input.date-range:focus{outline:none;border-color:var(--accent)}

/* ACTIVE FILTER DISPLAY */
.active-filter-bar{background:rgba(0,212,255,0.05);border-bottom:1px solid rgba(0,212,255,0.1);padding:8px 20px;display:none;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.active-filter-bar.show{display:flex}
.active-filter-tag{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:12px;padding:2px 8px;color:var(--accent);display:inline-flex;align-items:center;gap:4px}
.active-filter-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;line-height:1;padding:0}

/* MAIN */
.db-main{padding:16px 20px;position:relative;z-index:1}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden;transition:all .3s;cursor:default}
.kpi-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,0.03),transparent);pointer-events:none}
.kpi-card:hover{border-color:var(--border2);box-shadow:var(--glow)}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px}
.kpi-icon{position:absolute;right:12px;top:12px;font-size:20px;opacity:.4}

/* CHART GRID */
.chart-row{display:grid;gap:12px;margin-bottom:12px}
.chart-row-2{grid-template-columns:1fr 1fr}
.chart-row-3{grid-template-columns:2fr 1fr 1fr}
.chart-row-21{grid-template-columns:2fr 1fr}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .3s;position:relative;overflow:hidden}
.chart-card:hover{border-color:var(--border2)}
.chart-card.clickable{cursor:pointer}
.chart-card.clickable:hover{box-shadow:var(--glow)}
.chart-card.highlighted{border-color:var(--accent);box-shadow:var(--glow)}

.chart-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-title span{color:var(--accent)}
.chart-hint{font-size:9px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}

.chart-wrap{position:relative}
.chart-wrap canvas{max-height:220px}
.chart-wrap-tall canvas{max-height:280px}
.chart-wrap-sm canvas{max-height:160px}

/* MATRIX TABLE */
.matrix-wrap{overflow-x:auto}
.matrix-table{width:100%;border-collapse:collapse;font-size:11px}
.matrix-table th{padding:7px 10px;text-align:center;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
.matrix-table th.row-header{text-align:left;width:100px}
.matrix-table td{padding:7px 10px;text-align:center;border-bottom:1px solid rgba(30,58,110,0.5);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;position:relative}
.matrix-table td:hover{background:rgba(0,212,255,0.08)}
.matrix-table td.name-cell{text-align:left;font-family:'Noto Sans KR',sans-serif;font-weight:600;font-size:12px;color:var(--text);cursor:pointer}
.matrix-table td.name-cell:hover{color:var(--accent2)}
.matrix-table th.row-header:hover{color:var(--accent);background:rgba(0,212,255,0.07)}
.matrix-table td.total-cell{font-weight:700;color:var(--accent2)}
.matrix-table tr:last-child td{border-bottom:none;font-weight:700;color:var(--accent);background:rgba(0,212,255,0.03)}
.matrix-table tr.selected-row td{background:rgba(0,255,157,0.05)}
.heat-0{color:var(--text3)}
.heat-1{color:#4ade80}
.heat-2{color:#22c55e}
.heat-3{color:#16a34a}
.heat-4{color:var(--warn)}
.heat-5{color:var(--danger)}

/* HEATMAP */
/* ── HEATMAP redesign ── */
.heatmap-stats-row{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.heatmap-stats-row strong{color:var(--accent);font-family:'JetBrains Mono',monospace}
.heatmap-grid-wrap{width:100%}
.heatmap-col-headers{display:grid;grid-template-columns:repeat(7,1fr) 40px;gap:4px;margin-bottom:5px}
.heatmap-day-hdr{text-align:center;font-size:11px;color:var(--text2);font-weight:700}
.heatmap-week-total-hdr{font-size:10px;color:var(--text3);text-align:center}
.heatmap-week-row{display:grid;grid-template-columns:repeat(7,1fr) 40px;gap:4px;margin-bottom:4px;align-items:center}
.heatmap-cell{height:46px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;transition:all .15s;border:1px solid transparent}
.heatmap-cell:hover{transform:scale(1.06);border-color:var(--accent);z-index:2}
.heatmap-cell.level-0{background:var(--surface2)}
.heatmap-cell.level-1{background:rgba(0,212,255,0.18)}
.heatmap-cell.level-2{background:rgba(0,212,255,0.38)}
.heatmap-cell.level-3{background:rgba(0,212,255,0.58)}
.heatmap-cell.level-4{background:rgba(0,255,157,0.50)}
.heatmap-cell.level-5{background:rgba(255,165,2,0.60)}
.heatmap-cell.level-6{background:rgba(255,71,87,0.70)}
.heatmap-cell-empty{opacity:0.06;cursor:default;pointer-events:none}
.heatmap-cell-empty:hover{transform:none;border-color:transparent}
.hm-day-num{font-size:10px;color:rgba(255,255,255,0.70);font-family:'JetBrains Mono',monospace;line-height:1;font-weight:500}
.hm-hours{font-size:12px;color:#fff;font-family:'JetBrains Mono',monospace;line-height:1;font-weight:700}
.heatmap-cell.level-0 .hm-day-num{color:var(--text2)}
.heatmap-cell.level-0 .hm-hours{color:var(--text3)}
.heatmap-week-total{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:700}
.heatmap-legend{display:flex;align-items:center;gap:5px;margin-top:12px;font-size:11px;color:var(--text3)}
.heatmap-legend-cell{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.heatmap-divider{height:1px;background:var(--border);margin:8px 0}

/* RADAR */
.radar-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.radar-btn{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s}
.radar-btn.active{border-color:var(--accent2);background:rgba(0,255,157,0.1);color:var(--accent2)}

/* WEEK TREND */
.trend-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.trend-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);cursor:pointer}
.trend-leg-dot{width:8px;height:8px;border-radius:50%}

/* THIS WEEK WIDGET */
.week-widget{display:flex;flex-direction:column;gap:8px}
.week-member-row{display:flex;align-items:center;gap:8px}
.week-member-name{font-size:12px;font-weight:600;width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .2s}
.week-member-name:hover{color:var(--accent2)}
.week-bar-wrap{flex:1;position:relative}
.week-bar-bg{height:20px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.week-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#000;white-space:nowrap;min-width:2px}
.week-bar-goal{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.3);z-index:1}
.week-member-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent2);width:50px;text-align:right;white-space:nowrap}

/* GAUGE */
.gauge-wrap{display:flex;align-items:center;justify-content:center;padding:10px 0}
.gauge-svg{overflow:visible}

/* LOADING */
.db-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--text3)}
.db-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.db-empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}

/* TOOLTIP */
.custom-tooltip{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);pointer-events:none;z-index:999;box-shadow:var(--shadow);display:none;max-width:200px}

/* ANIMATE */
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .chart-row-2,.chart-row-3,.chart-row-21{grid-template-columns:1fr}
  .filter-bar{padding:10px 12px}
  .db-main{padding:12px}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}

/* ══════════════════════════════════
   macOS LIGHT THEME (data-theme="mac")
   ══════════════════════════════════ */
html[data-theme="mac"]{
  --bg:#f0f0f5;--surface:#ffffff;--surface2:#f5f5f7;--surface3:#e9e9ed;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.15);
  --accent:#0071e3;--accent2:#34c759;--accent3:#af52de;
  --danger:#ff3b30;--warn:#ff9500;--pink:#ff6b6b;
  --text:rgba(0,0,0,0.85);--text2:rgba(0,0,0,0.5);--text3:rgba(0,0,0,0.28);
  --glow:0 2px 12px rgba(0,113,227,0.15);--shadow:0 4px 20px rgba(0,0,0,0.1);
}
html[data-theme="mac"] body{background:#f0f0f5}
html[data-theme="mac"] body::before{display:none}
html[data-theme="mac"] .db-header{background:rgba(248,248,250,.95);border-color:rgba(0,0,0,.1)}
html[data-theme="mac"] .filter-bar{background:#fff;border-color:rgba(0,0,0,.08)}
html[data-theme="mac"] .filter-chip{background:#f5f5f7;border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.5)}
html[data-theme="mac"] .filter-chip:hover{border-color:var(--accent);color:var(--accent)}
html[data-theme="mac"] .filter-chip.active{background:rgba(0,113,227,.1);border-color:var(--accent);color:var(--accent)}
html[data-theme="mac"] .filter-chip.active-member{background:rgba(52,199,89,.1);border-color:var(--accent2);color:var(--accent2)}
html[data-theme="mac"] .filter-chip.active-cat{background:rgba(175,82,222,.1);border-color:var(--accent3);color:var(--accent3)}
html[data-theme="mac"] select.filter-select{background:#f5f5f7;border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.85);color-scheme:light}
html[data-theme="mac"] .period-btn{background:#f5f5f7;border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.5)}
html[data-theme="mac"] .period-btn:hover{border-color:var(--accent);color:var(--accent)}
html[data-theme="mac"] .period-btn.active{background:rgba(0,113,227,.1);border-color:var(--accent);color:var(--accent)}
html[data-theme="mac"] input.date-range{background:#f5f5f7;border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.85);color-scheme:light}
html[data-theme="mac"] .db-back{background:#f5f5f7;border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.5)}
html[data-theme="mac"] .db-back:hover{border-color:var(--accent);color:var(--accent)}
html[data-theme="mac"] .kpi-card{background:#fff;border-color:rgba(0,0,0,.08)}
html[data-theme="mac"] .kpi-card::before{background:none}
html[data-theme="mac"] .kpi-card:hover{border-color:rgba(0,113,227,.3);box-shadow:0 2px 12px rgba(0,113,227,.1)}
html[data-theme="mac"] .chart-card{background:#fff;border-color:rgba(0,0,0,.08)}
html[data-theme="mac"] .chart-card-header{border-color:rgba(0,0,0,.06)}
html[data-theme="mac"] .chart-title{color:rgba(0,0,0,.85)}
html[data-theme="mac"] .member-row:hover,.html[data-theme="mac"] .cat-row:hover{background:rgba(0,0,0,.03)}
html[data-theme="mac"] .week-row:hover{background:rgba(0,0,0,.03)}
html[data-theme="mac"] .week-member-bar-bg{background:rgba(0,0,0,.07)}
html[data-theme="mac"] ::-webkit-scrollbar-track{background:#f0f0f5}
html[data-theme="mac"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2)}
html[data-theme="mac"] .active-filter-bar{background:rgba(0,113,227,.05);border-color:rgba(0,113,227,.1)}
html[data-theme="mac"] .custom-tooltip{background:#fff;border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.85)}
html[data-theme="mac"] .db-spinner{border-color:rgba(0,0,0,.1);border-top-color:var(--accent)}
html[data-theme="mac"] .heatmap-cell.level-0{background:rgba(0,0,0,.07)}
html[data-theme="mac"] .hm-day-num{color:rgba(0,0,0,0.5)}
html[data-theme="mac"] .hm-hours{color:rgba(0,0,0,0.85)}
html[data-theme="mac"] .heatmap-cell.level-0 .hm-day-num{color:rgba(0,0,0,0.35)}
html[data-theme="mac"] .heatmap-cell.level-0 .hm-hours{color:rgba(0,0,0,0.3)}
html[data-theme="mac"] .heatmap-week-total{color:var(--accent)}
html[data-theme="mac"] .heatmap-day-hdr{color:rgba(0,0,0,0.5)}

/* theme toggle */
.db-theme-btn{background:rgba(128,128,128,.1);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 8px;font-size:15px;cursor:pointer;font-family:inherit;transition:all .2s;line-height:1}
.db-theme-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="db-header">
  <div class="db-title">
    <span class="db-logo">WL</span>
    <div>
      <div class="db-name">공수 대시보드</div>
      <div class="db-sub">인터랙티브 분석 · 클릭하면 필터 적용</div>
    </div>
  </div>
  <div class="db-controls">
    <button class="period-btn active" id="btn-thisweek" onclick="setPeriod('thisweek')">이번 주</button>
    <button class="period-btn" id="btn-lastweek" onclick="setPeriod('lastweek')">지난 주</button>
    <button class="period-btn" id="btn-thismonth" onclick="setPeriod('thismonth')">이번 달</button>
    <button class="period-btn" id="btn-lastmonth" onclick="setPeriod('lastmonth')">지난 달</button>
    <div style="display:flex;align-items:center;gap:4px">
      <input type="date" class="date-range" id="date-start" onchange="onRangeChange()">
      <span style="color:var(--text3);font-size:11px">~</span>
      <input type="date" class="date-range" id="date-end" onchange="onRangeChange()">
    </div>
    <button id="pdf-btn" class="db-back" onclick="exportDashboardPDF()" style="border-color:rgba(0,255,157,0.4);color:var(--accent2);min-width:80px">🖨️ PDF 출력</button>
    <button class="db-theme-btn" id="db-theme-btn" onclick="toggleDbTheme()" title="테마 전환"></button>

const SUPABASE_URL = 'https://uulemznemzjlgzqhrchb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bGVtem5lbXpqbGd6cWhyY2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTc3MzQsImV4cCI6MjA5Mzk5MzczNH0.cy3jWrFez0pO0vl3nOOUMiv-511IzQiTcNxTK8Jejrg';

// STATE
let allLogs = [], allEmployees = [], allCategories = [], monthGoal = 160;
let filters = { members: [], categories: [] };
let charts = {};

function getMemberColor(empId) {

let radarSelected = [];

// 근태 상수
const ATTEND_HOURS_DAILY = {annual:8, half:4, quarter:2, other:0};
const ATTEND_LABELS_DB   = {annual:'연차', half:'반차', quarter:'반반차', other:'기타근태'};

// 로컬 날짜 → YYYY-MM-DD (toISOString은 UTC 기준이라 한국에서 날짜 오류 발생)
function dateToStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// 근태 레코드 → 가상 work_log 배열로 변환
function attendToLogs(attends, employees, periodStart, periodEnd){
  const empMap = {};
  employees.forEach(function(e){ empMap[e.id] = e; });
  const logs = [];
  const pStart = new Date(periodStart + 'T00:00:00');
  const pEnd   = new Date(periodEnd   + 'T00:00:00');

  attends.forEach(function(a){
    const emp = empMap[a.employee_id];
    if(!emp) return;
    const dailyH = ATTEND_HOURS_DAILY[a.attend_type] || 0;
    if(!dailyH) return; // 기타(0h)는 제외

    let d = new Date(a.start_date + 'T00:00:00');
    const endD = new Date(a.end_date + 'T00:00:00');

    while(d <= endD){
      if(d >= pStart && d <= pEnd){
        const dw = d.getDay();
        if(dw !== 0 && dw !== 6){ // 주말 제외
          const dateStr = dateToStr(d);
          logs.push({
            id: 'attend-'+a.id+'-'+dateStr,
            employee_id: a.employee_id,
            category_id: 'attend-virtual',
            log_date: dateStr,
            hours: dailyH,
            plan_hours: dailyH,
            difficulty: 'low',
            content: ATTEND_LABELS_DB[a.attend_type] || '근태',
            categories: {name:'근태'},
            employees: {name:emp.name, emp_id:emp.emp_id}
          });
        }
      }
      d.setDate(d.getDate() + 1);
    }
  });
  return logs;
}

const COLORS = ['#00d4ff','#00ff9d','#7c3aed','#ff6b9d','#ffa502','#ff4757','#00b4d8','#06d6a0','#f72585','#4cc9f0'];
const DIFF_COLORS = { low:'#00ff9d', mid:'#ffa502', high:'#ff4757' };
const ATTEND_COLOR = '#a78bfa'; // 근태 전용 색상 (보라)

// 카테고리명으로 색상 반환 (근태는 고정색)
function getCatColor(catName, idx){
  return catName === '근태' ? ATTEND_COLOR : COLORS[idx % COLORS.length];
}

// ─── INIT ───
window.addEventListener('load', async () => {
  const user = JSON.parse(localStorage.getItem('wl_user')||'null');
  if (!user || !user.is_admin) {
    document.querySelector('.db-main').innerHTML = '<div class="db-empty"><div style="font-size:40px;margin-bottom:12px">🔒</div><p>관리자만 접근 가능합니다</p><a href="index.html" style="color:var(--accent);margin-top:12px;display:block">← 앱으로 돌아가기</a></div>';
    return;
  }
  setPeriod('thisweek');
});

function getWorkingDays(startStr, endStr) {
  let count = 0;
  const d = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  while(d <= end){ const dw=d.getDay(); if(dw!==0&&dw!==6)count++; d.setDate(d.getDate()+1); }
  return count;
}

function setPeriod(preset) {
  const now = new Date();
  let start, end;
  if(preset==='thisweek'){
    const mon=new Date(now); mon.setDate(now.getDate()-(now.getDay()||7)+1);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    start=dateToStr(mon); end=dateToStr(sun);
  } else if(preset==='lastweek'){
    const mon=new Date(now); mon.setDate(now.getDate()-(now.getDay()||7)-6);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    start=dateToStr(mon); end=dateToStr(sun);
  } else if(preset==='thismonth'){
    const y=now.getFullYear(),m=now.getMonth();
    start=`${y}-${String(m+1).padStart(2,'0')}-01`;
    end=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  } else if(preset==='lastmonth'){
    const d=new Date(now.getFullYear(),now.getMonth()-1,1);
    const y=d.getFullYear(),m=d.getMonth();
    start=`${y}-${String(m+1).padStart(2,'0')}-01`;
    end=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  }
  document.getElementById('date-start').value=start;
  document.getElementById('date-end').value=end;
  ['thisweek','lastweek','thismonth','lastmonth'].forEach(id=>{
    document.getElementById('btn-'+id)?.classList.toggle('active', id===preset);
  });
  loadData();
}

function onRangeChange(){
  // 직접 날짜 선택 시 프리셋 버튼 비활성화
  ['thisweek','lastweek','thismonth','lastmonth'].forEach(id=>{
    document.getElementById('btn-'+id)?.classList.remove('active');
  });
  loadData();
}

async function loadData() {
  const start = document.getElementById('date-start').value;
  const end = document.getElementById('date-end').value;
  if(!start||!end) return;

  document.querySelector('.db-main').style.opacity = '0.5';

  try {
    const [logsRes, empRes, catRes, attendRes] = await Promise.all([
      fetch(`${API}/work_logs?log_date=gte.${start}&log_date=lte.${end}&select=*,categories(name),employees(name,emp_id)&order=log_date`, {headers:H}),
      fetch(`${API}/employees?order=name`, {headers:H}),
      fetch(`${API}/categories?is_active=eq.true&order=name`, {headers:H}),
      fetch(`${API}/attends?start_date=lte.${end}&end_date=gte.${start}&select=*`, {headers:H})
    ]);
    allLogs = await logsRes.json();
    allEmployees = await empRes.json();
    // 인원별 고정 색상 맵 빌드
    allEmployees.forEach((e, i) => { memberColorMap[e.id] = COLORS[i % COLORS.length]; });
    allCategories = await catRes.json();
    const attends = await attendRes.json();

    // 근태 중복 방지: DB에 이미 '근태' 카테고리가 있으면 제거 후 가상 카테고리만 사용
    allCategories = allCategories.filter(function(c){ return c.name !== '근태'; });
    allCategories.push({id:'attend-virtual', name:'근태', is_active:true});

    // 근태 공수 포함
    if(attends && attends.length){
      allLogs = allLogs.concat(attendToLogs(attends, allEmployees, start, end));
    }

    // 기간 목표: 근무일 × 8h / 인
    monthGoal = getWorkingDays(start, end) * 8;

  } catch(e) {
    // DEMO DATA
    allEmployees = [{id:'e1',name:'이상우',emp_id:'2020016'},{id:'e2',name:'유태규',emp_id:'E002'},{id:'e3',name:'김형성',emp_id:'E003'},{id:'e4',name:'김경원',emp_id:'E004'},{id:'e5',name:'김동호',emp_id:'E005'},{id:'e6',name:'이주명',emp_id:'E006'}];
    allCategories = [{id:'c1',name:'제조'},{id:'c2',name:'QA'},{id:'c3',name:'문서관리'},{id:'c4',name:'교육'},{id:'c5',name:'회의'},{id:'c6',name:'기타'},{id:'attend-virtual',name:'근태'}];
    allLogs = generateDemoData();
    monthGoal = getWorkingDays(start, end) * 8;
    // 데모 데이터도 색상 맵 빌드
    allEmployees.forEach((e, i) => { memberColorMap[e.id] = COLORS[i % COLORS.length]; });
  }

  filters = { members:[], categories:[] };
  buildFilterChips();
  clearAllFilters();
  document.querySelector('.db-main').style.opacity = '1';
}

function generateDemoData() {
  const logs = [];
  const start = document.getElementById('date-start').value || dateToStr(new Date()).slice(0,8)+'01';
  const [y,m] = start.split('-');
  const days = new Date(y,m,0).getDate();
  allEmployees.forEach(e => {
    for(let d=1;d<=days;d++) {
      if(d%7===0||d%7===6) continue;
      if(Math.random()<0.3) continue;
      const cat = allCategories[Math.floor(Math.random()*allCategories.length)];
      const h = (Math.floor(Math.random()*8)+2)*0.5;
      const ph = h*(0.8+Math.random()*0.4);
      logs.push({
        id:`l${e.id}${d}`, employee_id:e.id, category_id:cat.id,
        log_date:`${y}-${m}-${String(d).padStart(2,'0')}`,
        hours:h, plan_hours:ph,
        difficulty:diffs[Math.floor(Math.random()*3)],
        content:'업무내용',
        categories:{name:cat.name}, employees:{name:e.name,emp_id:e.emp_id}
      });
    }
  });
  return logs;
}

// ─── FILTER CHIPS ───
function buildFilterChips() {
  const mc = document.getElementById('member-chips');
  mc.innerHTML =
    `<button class="filter-chip active" id="m-all" onclick="selectAllMembers()">전체</button>` +
    allEmployees.map(e => `<button class="filter-chip" id="m-${e.id}" onclick="toggleMemberFilter('${e.id}','${e.name}')">${e.name}</button>`).join('');

  const cc = document.getElementById('category-chips');
  cc.innerHTML =
    `<button class="filter-chip active" id="c-all" onclick="selectAllCategories()">전체</button>` +
    allCategories.map(c => `<button class="filter-chip" id="c-${c.id}" onclick="toggleCatFilter('${c.id}','${c.name}')">${c.name}</button>`).join('');
}

function syncAllBtn(type) {
  if (type === 'member') {
    const allBtn = document.getElementById('m-all');
    // 필터 없음(전체) OR 모든 인원이 명시 선택된 경우 → 전체 비활성(개별 선택 상태)
    const allExplicit = allEmployees.length > 0 && filters.members.length === allEmployees.length;
    if (allBtn) allBtn.classList.toggle('active', filters.members.length === 0 && !allExplicit);
  } else {
    const allBtn = document.getElementById('c-all');
    const allExplicit = allCategories.length > 0 && filters.categories.length === allCategories.length;
    if (allBtn) allBtn.classList.toggle('active', filters.categories.length === 0 && !allExplicit);
  }
}

function selectAllMembers() {
  const allBtn = document.getElementById('m-all');
  const isActive = allBtn?.classList.contains('active');

  if (isActive) {
    // 전체가 이미 선택된 상태 → 전체 해제 (모든 개별 멤버를 명시적으로 선택 상태로 전환)
    filters.members = allEmployees.map(e => e.id);
    document.querySelectorAll('[id^="m-"]').forEach(el => el.classList.add('active-member'));
    allBtn?.classList.remove('active');
  } else {
    // 전체 선택
    filters.members = [];
    document.querySelectorAll('[id^="m-"]').forEach(el => el.classList.remove('active-member'));
    allBtn?.classList.add('active');
  }
  applyFilters();
}

function selectAllCategories() {
  const allBtn = document.getElementById('c-all');
  const isActive = allBtn?.classList.contains('active');

  if (isActive) {
    // 전체가 이미 선택된 상태 → 전체 해제 (모든 개별 카테고리를 명시적으로 선택 상태로 전환)
    filters.categories = allCategories.map(c => c.id);
    document.querySelectorAll('[id^="c-"]').forEach(el => el.classList.add('active-cat'));
    allBtn?.classList.remove('active');
  } else {
    // 전체 선택
    filters.categories = [];
    document.querySelectorAll('[id^="c-"]').forEach(el => el.classList.remove('active-cat'));
    allBtn?.classList.add('active');
  }
  applyFilters();
}

function toggleMemberFilter(id, name) {
  const idx = filters.members.indexOf(id);
  if (idx >= 0) filters.members.splice(idx, 1);
  else filters.members.push(id);
  document.getElementById(`m-${id}`)?.classList.toggle('active-member', filters.members.includes(id));
  syncAllBtn('member');
  applyFilters();
}

function toggleCatFilter(id, name) {
  const idx = filters.categories.indexOf(id);
  if (idx >= 0) filters.categories.splice(idx, 1);
  else filters.categories.push(id);
  document.getElementById(`c-${id}`)?.classList.toggle('active-cat', filters.categories.includes(id));
  syncAllBtn('category');
  applyFilters();
}

function clearAllFilters() {
  filters = { members:[], categories:[] };
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active','active-member','active-cat'));
  document.getElementById('m-all')?.classList.add('active');
  document.getElementById('c-all')?.classList.add('active');
  document.getElementById('active-filter-bar').classList.remove('show');
  radarSelected = allEmployees.map(e=>e.id);
  renderAll(allLogs);
}

function applyFilters() {
  let filtered = allLogs;
  if (filters.members.length) filtered = filtered.filter(l => filters.members.includes(l.employee_id));
  if (filters.categories.length) filtered = filtered.filter(l => filters.categories.includes(l.category_id));
  updateActiveFilterBar();
  renderAll(filtered);
}

function updateActiveFilterBar() {
  const bar = document.getElementById('active-filter-bar');
  const tags = document.getElementById('active-filter-tags');
  const items = [];
  filters.members.forEach(id => {
    const e = allEmployees.find(x=>x.id===id);
    if(e) items.push(`<span class="active-filter-tag">👤 ${e.name} <button onclick="toggleMemberFilter('${id}','${e.name}')">✕</button></span>`);
  });
  filters.categories.forEach(id => {
    const c = allCategories.find(x=>x.id===id);
    if(c) items.push(`<span class="active-filter-tag">🏷️ ${c.name} <button onclick="toggleCatFilter('${id}','${c.name}')">✕</button></span>`);
  });
  tags.innerHTML = items.join('');
  bar.classList.toggle('show', items.length > 0);
}

// ─── RENDER ALL ───
function renderAll(logs) {
  updateKPI(logs);
  renderBarChart(logs);
  renderPieChart(logs);
  renderMatrix(logs);
  renderTrendChart(logs);
  renderRadarChart(logs);
  renderHeatmap(logs);
  renderWeekWidget();
  renderMonthlyTrend();
}

// ─── KPI ───
function updateKPI(logs) {
  const totalH = logs.reduce((s,l)=>s+Number(l.hours),0);
  const members = new Set(logs.map(l=>l.employee_id)).size;
  const avgH = members>0 ? totalH/members : 0;
  const teamTarget = monthGoal * (allEmployees.length||members);
  const util = teamTarget>0 ? Math.min((totalH/teamTarget*100),999).toFixed(0) : 0;
  const start = document.getElementById('date-start').value;
  const end = document.getElementById('date-end').value;

  animateNum('kpi-total', totalH, 1);
  document.getElementById('kpi-total-sub').textContent = `${start}~${end.slice(5)}`;
  animateNum('kpi-members', members, 0);
  animateNum('kpi-avg', avgH, 1);
  document.getElementById('kpi-util').textContent = util+'%';
  document.getElementById('kpi-util').style.color = util>=80?'var(--danger)':util>=60?'var(--warn)':'var(--pink)';
  document.getElementById('kpi-util-sub').textContent = `목표 ${monthGoal}h/인`;
  animateNum('kpi-logs', logs.length, 0);
}

function animateNum(id, target, dec) {
  const el = document.getElementById(id);
  const start = parseFloat(el.textContent)||0;
  const dur = 600, step = 16;
  let t = 0;
  const timer = setInterval(()=>{
    t += step;
    const progress = Math.min(t/dur, 1);
    const ease = 1-Math.pow(1-progress,3);
    el.textContent = (start+(target-start)*ease).toFixed(dec);
    if(progress>=1) clearInterval(timer);
  }, step);
}

// ─── BAR CHART ───
function renderBarChart(logs) {
  const byMember = {};
  allEmployees.forEach(e => byMember[e.id] = {name:e.name, hours:0, planH:0});
  logs.forEach(l => { if(byMember[l.employee_id]) { byMember[l.employee_id].hours += Number(l.hours); byMember[l.employee_id].planH += Number(l.plan_hours||0); }});
  const sorted = Object.values(byMember).sort((a,b)=>b.hours-a.hours);
  const labels = sorted.map(v=>v.name);
  const data = sorted.map(v=>v.hours);
  const planData = sorted.map(v=>v.planH);

  destroyChart('chart-bar');
  charts['chart-bar'] = new Chart(document.getElementById('chart-bar'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'실제 공수',data,backgroundColor:sorted.map(v=>{ const e=allEmployees.find(x=>x.name===v.name); return getMemberColor(e?.id)+'cc'; }),borderRadius:6,borderSkipped:false},
        {label:'예상 공수',data:planData,backgroundColor:cc().planBar,borderColor:cc().planBorder,borderWidth:1,borderRadius:6,borderSkipped:false}
      ]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toFixed(1)}h`}}},
      scales:{x:{grid:{color:cc().grid},ticks:{color:cc().tick,font:{size:10}}},y:{grid:{display:false},ticks:{color:cc().tickStrong,font:{size:11,weight:'600'}}}},
      onClick:(e,els)=>{

        const name = labels[els[0].index];
        const emp = allEmployees.find(x=>x.name===name);
        if(emp){ toggleMemberFilter(emp.id, emp.name); syncAllBtn('member'); }
      }
    }
  });
}

// ─── GAUGE ───
function renderGauge(logs) {
  const totalH = logs.reduce((s,l)=>s+Number(l.hours),0);
  const teamTarget = monthGoal * (allEmployees.length||1);
  const pct = Math.min(totalH/teamTarget, 1);
  const color = pct>=0.8?'#ff4757':pct>=0.6?'#ffa502':'#00d4ff';
  const deg = pct * 180;

  document.getElementById('gauge-wrap').innerHTML = `
    <svg class="gauge-svg" width="160" height="90" viewBox="0 0 160 90">
      <path d="M 15 85 A 65 65 0 0 1 145 85" fill="none" stroke="var(--surface2)" stroke-width="12" stroke-linecap="round"/>
      <path d="M 15 85 A 65 65 0 0 1 145 85" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"
        stroke-dasharray="${deg/180*204} 204" style="filter:drop-shadow(0 0 6px ${color})"/>
      <text x="80" y="80" text-anchor="middle" fill="${color}" font-family="JetBrains Mono" font-size="20" font-weight="700">${(pct*100).toFixed(0)}%</text>
    </svg>`;
  document.getElementById('gauge-detail').innerHTML = `
    실적 <strong style="color:var(--accent2)">${totalH.toFixed(1)}h</strong> / 목표 <strong style="color:var(--text2)">${teamTarget.toFixed(0)}h</strong>`;
}

// ─── MATRIX ───
function renderMatrix(logs) {
  const cats = [...new Set(logs.map(l=>l.categories?.name||'기타'))].sort();
  const members = allEmployees.filter(e=>logs.some(l=>l.employee_id===e.id));

  const matrix = {};
  members.forEach(e=>{matrix[e.id]={};cats.forEach(c=>{matrix[e.id][c]=0;});});
  logs.forEach(l=>{const c=l.categories?.name||'기타';if(matrix[l.employee_id])matrix[l.employee_id][c]=(matrix[l.employee_id][c]||0)+Number(l.hours);});

  const memberTotals = {};
  members.forEach(e=>{memberTotals[e.id]=cats.reduce((s,c)=>s+(matrix[e.id]?.[c]||0),0);});
  const catTotals = {};
  cats.forEach(c=>{catTotals[c]=members.reduce((s,e)=>s+(matrix[e.id]?.[c]||0),0);});
  const grandTotal = Object.values(memberTotals).reduce((s,v)=>s+v,0);
  const maxCell = Math.max(...members.flatMap(e=>cats.map(c=>matrix[e.id]?.[c]||0)));

  function heatClass(v){ if(!v)return 'heat-0'; const r=v/maxCell; return r<.1?'heat-1':r<.25?'heat-2':r<.5?'heat-3':r<.75?'heat-4':'heat-5'; }

  const matAllActive = filters.members.length === 0;
  const matAllExplicit = filters.members.length === allEmployees.length && allEmployees.length > 0;
  document.getElementById('matrix-table').innerHTML = `
    <table class="matrix-table">
      <thead><tr>
        <th class="row-header" onclick="selectAllMembers()" style="cursor:pointer;user-select:none" title="전체 선택/해제">
          ${matAllActive ? '✅ 전체' : matAllExplicit ? '☑️ 전체' : '이름'}
        </th>
        ${cats.map(c=>`<th>${c}</th>`).join('')}
        <th>합계</th>
      </tr></thead>
      <tbody>
      ${members.sort((a,b)=>memberTotals[b.id]-memberTotals[a.id]).map(e=>`
        <tr class="${filters.members.includes(e.id)?'selected-row':''}">
          <td class="name-cell" onclick="toggleMemberFilter('${e.id}','${e.name}')">${e.name}</td>
          ${cats.map(c=>`<td class="${heatClass(matrix[e.id]?.[c]||0)}" onclick="handleMatrixClick('${e.id}','${e.name}','${c}')" title="${e.name} × ${c}: ${(matrix[e.id]?.[c]||0).toFixed(1)}h">
            ${(matrix[e.id]?.[c]||0)>0?(matrix[e.id][c]).toFixed(1):'-'}
          </td>`).join('')}
          <td class="total-cell">${memberTotals[e.id].toFixed(1)}</td>
        </tr>`).join('')}
      <tr>
        <td style="color:var(--accent);font-weight:700">합계</td>
        ${cats.map(c=>`<td style="color:var(--accent)">${catTotals[c].toFixed(1)}</td>`).join('')}
        <td style="color:var(--accent2);font-weight:700">${grandTotal.toFixed(1)}</td>
      </tr>
      </tbody>
    </table>`;
}

function handleMatrixClick(empId, empName, catName) {
  toggleMemberFilter(empId, empName);
  syncAllBtn('member');
  const cat = allCategories.find(c=>c.name===catName);
  if (cat) { toggleCatFilter(cat.id, catName); syncAllBtn('category'); }
}

// ─── TREND CHART ───
function renderTrendChart(logs) {
  const start = document.getElementById('date-start').value;
  const end   = document.getElementById('date-end').value;
  const days  = getWorkingDays(start, end);
  const byDay = days <= 31; // 31일 이하면 일별, 그 이상이면 주별

  const bucketMap = {};
  logs.forEach(l=>{
    let key;
    if(byDay){
      key = l.log_date;
    } else {
      const d=new Date(l.log_date+'T00:00:00');
      d.setDate(d.getDate()-(d.getDay()||7)+1);
      key=dateToStr(d);
    }
    if(!bucketMap[key])bucketMap[key]={};
    bucketMap[key][l.employee_id]=(bucketMap[key][l.employee_id]||0)+Number(l.hours);
  });

  const keys = Object.keys(bucketMap).sort();
  const labels = keys.map(k=>{
    const d=new Date(k+'T00:00:00');
    return byDay ? `${d.getMonth()+1}/${d.getDate()}` : `${d.getMonth()+1}/${d.getDate()}주`;
  });

  const members = allEmployees.filter(e=>logs.some(l=>l.employee_id===e.id));
  const datasets = members.map((e)=>({
    label:e.name,
    data:keys.map(k=>bucketMap[k]?.[e.id]||0),
    borderColor:getMemberColor(e.id),
    backgroundColor:getMemberColor(e.id)+'20',
    borderWidth:2, pointRadius:byDay?3:4, pointHoverRadius:6, tension:.4, fill:false
  }));

  document.getElementById('trend-legend').innerHTML = members.map((e)=>`
    <div class="trend-leg-item" onclick="toggleMemberFilter('${e.id}','${e.name}')">
      <div class="trend-leg-dot" style="background:${getMemberColor(e.id)}"></div>${e.name}
    </div>`).join('');

  destroyChart('chart-trend');
  charts['chart-trend'] = new Chart(document.getElementById('chart-trend'),{
    type:'line',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{
        legend:{display:false},
        tooltip:{mode:'index',intersect:false},
        title:{display:true,text:byDay?'일별 공수':'주별 공수',color:'#3d6a9e',font:{size:10}}
      },
      scales:{
        x:{grid:{color:cc().grid},ticks:{color:cc().tick,font:{size:10},maxTicksLimit:14}},
        y:{grid:{color:cc().grid},ticks:{color:cc().tick,font:{size:10}},beginAtZero:true}
      }
    }
  });
}

// ─── RADAR CHART ───
function renderRadarChart(logs) {
  const cats = allCategories.map(c=>c.name);
  // radarSelected가 비어있으면 전체 해제 상태 → 빈 차트
  const members = allEmployees.filter(e=>radarSelected.includes(e.id));
  const byMemberCat = {};
  logs.forEach(l=>{
    if(!byMemberCat[l.employee_id])byMemberCat[l.employee_id]={};
    const c=l.categories?.name||'기타';
    byMemberCat[l.employee_id][c]=(byMemberCat[l.employee_id][c]||0)+Number(l.hours);
  });

  const datasets = members.map((e)=>({
    label:e.name,
    data:cats.map(c=>byMemberCat[e.id]?.[c]||0),
    backgroundColor:getMemberColor(e.id)+'30',
    borderColor:getMemberColor(e.id),
    borderWidth:2, pointBackgroundColor:getMemberColor(e.id), pointRadius:3
  }));

  // Selector buttons
  const isAll = radarSelected.length === allEmployees.length;
  document.getElementById('radar-selector').innerHTML =
    `<button class="radar-btn ${isAll?'active':''}" onclick="toggleRadarAll()" style="${isAll?'border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.1)':''}">전체</button>` +
    allEmployees.map((e)=>`
    <button class="radar-btn ${radarSelected.includes(e.id)?'active':''}" onclick="toggleRadar('${e.id}')" style="${radarSelected.includes(e.id)?`border-color:${getMemberColor(e.id)};color:${getMemberColor(e.id)};background:${getMemberColor(e.id)}20`:''}">${e.name}</button>`).join('');

  destroyChart('chart-radar');
  charts['chart-radar'] = new Chart(document.getElementById('chart-radar'),{
    type:'radar',data:{labels:cats,datasets},
    options:{responsive:true,maintainAspectRatio:true,
      scales:{r:{grid:{color:cc().gridR},angleLines:{color:cc().gridR},pointLabels:{color:cc().radarPoint,font:{size:10}},ticks:{color:cc().radarTick,font:{size:8},backdropColor:'transparent'}}},
      plugins:{legend:{display:false}}}
  });
}

function _radarFilteredLogs() {
  return allLogs.filter(l=>{
    if(filters.members.length&&!filters.members.includes(l.employee_id))return false;
    if(filters.categories.length&&!filters.categories.includes(l.category_id))return false;
    return true;
  });
}

function toggleRadarAll() {
  const isAll = radarSelected.length === allEmployees.length;
  if (isAll) {
    // 전체 선택 상태 → 전체 해제 (아무도 선택 안 된 상태)
    radarSelected = [];
  } else {
    // 전체 선택
    radarSelected = allEmployees.map(e=>e.id);
  }
  renderRadarChart(_radarFilteredLogs());
}

function toggleRadar(id) {
  const idx = radarSelected.indexOf(id);
  if (idx >= 0) {
    radarSelected.splice(idx, 1); // 선택 해제 (1명만 남아도 해제 허용)
  } else {
    radarSelected.push(id);
  }
  // radarSelected가 비어있으면 전체 해제 상태 유지 (전체 버튼으로 복귀 가능)
  renderRadarChart(_radarFilteredLogs());
}

// ─── HEATMAP ───
function renderHeatmap(logs) {
  const start = document.getElementById('date-start').value;
  const end = document.getElementById('date-end').value;
  if(!start||!end) return;

  const byDate = {};
  logs.forEach(l=>byDate[l.log_date]=(byDate[l.log_date]||0)+Number(l.hours));
  const maxH = Math.max(...Object.values(byDate),1);
  function level(h){ if(!h)return 0; const r=h/maxH; return r<.1?1:r<.25?2:r<.5?3:r<.75?4:r<.9?5:6; }

  // 시작일이 속한 주 월요일부터 그리기
  const startD = new Date(start+'T00:00:00');
  const endD = new Date(end+'T00:00:00');
  const gridStart = new Date(startD);
  const dayOfWeek = gridStart.getDay()||7; // 월=1 ~ 일=7
  gridStart.setDate(gridStart.getDate() - (dayOfWeek - 1));

  const weeks = [];
  let week = [];
  const cur = new Date(gridStart);
  while(cur <= endD){
    const dateStr = dateToStr(cur);
    const inRange = cur >= startD && cur <= endD;
    week.push(inRange ? {d:cur.getDate(),date:dateStr,h:byDate[dateStr]||0} : null);
    if(week.length===7){weeks.push(week);week=[];}
    cur.setDate(cur.getDate()+1);
  }
  if(week.length){while(week.length<7)week.push(null);weeks.push(week);}

  // 주별 합계 포함
  const weeksData = weeks.map(w => ({
    cells: w,
    weekTotal: w.reduce((s, c) => s + (c ? c.h : 0), 0)
  }));

  // 통계
  const daysWorked = Object.values(byDate).filter(h => h > 0).length;
  const totalH = Object.values(byDate).reduce((s, h) => s + h, 0);
  const avgH = daysWorked > 0 ? (totalH / daysWorked) : 0;
  const peakEntry = Object.entries(byDate).sort((a,b)=>b[1]-a[1])[0];
  const peakDay = peakEntry ? peakEntry[0].slice(5) + '(' + peakEntry[1].toFixed(0) + 'h)' : '-';

  const dayNames = ['월','화','수','목','금','토','일'];

  document.getElementById('heatmap-wrap').innerHTML = `
    <div class="heatmap-stats-row">
      <span>📅 근무일 <strong>${daysWorked}일</strong></span>
      <span>⏱ 일평균 <strong>${avgH.toFixed(1)}h</strong></span>
      <span>🔥 최다 <strong>${peakDay}</strong></span>
    </div>
    <div class="heatmap-grid-wrap">
      <div class="heatmap-col-headers">
        ${dayNames.map(d=>`<div class="heatmap-day-hdr">${d}</div>`).join('')}
        <div class="heatmap-week-total-hdr">주합</div>
      </div>
      ${weeksData.map(w=>`
        <div class="heatmap-week-row">
          ${w.cells.map(cell => cell
            ? `<div class="heatmap-cell level-${level(cell.h)}"
                    title="${cell.date}  ${cell.h.toFixed(1)}h"
                    onclick="handleHeatmapClick('${cell.date}')">
                 <span class="hm-day-num">${cell.d}일</span>
                 <span class="hm-hours">${cell.h > 0 ? (cell.h >= 10 ? cell.h.toFixed(0) : cell.h.toFixed(1)) + 'h' : '-'}</span>
               </div>`
            : `<div class="heatmap-cell heatmap-cell-empty level-0"></div>`
          ).join('')}
          <div class="heatmap-week-total">${w.weekTotal > 0 ? w.weekTotal.toFixed(0)+'h' : ''}</div>
        </div>`).join('')}
    </div>
    <div class="heatmap-legend">
      <span>적음</span>
      ${[0,1,2,3,4,5,6].map(l=>`<div class="heatmap-legend-cell level-${l}"></div>`).join('')}
      <span>많음</span>
    </div>`;
}

function handleHeatmapClick(date) {
  const dayLogs = allLogs.filter(l=>l.log_date===date);
  if(!dayLogs.length) return;
  const total = dayLogs.reduce((s,l)=>s+Number(l.hours),0);
  const memberNames = [...new Set(dayLogs.map(l=>l.employees?.name).filter(Boolean))].join(', ');
  const catNames = [...new Set(dayLogs.map(l=>l.categories?.name).filter(Boolean))].join(', ');

  // 해당 날짜 멤버로 필터 적용
  const memberIds = [...new Set(dayLogs.map(l=>l.employee_id))];
  filters.members = memberIds;
  document.querySelectorAll('[id^="m-"]').forEach(function(el){ el.classList.remove('active-member'); });
  memberIds.forEach(function(id){
    const el = document.getElementById('m-'+id);
    if(el) el.classList.add('active-member');
  });
  syncAllBtn('member');
  updateActiveFilterBar();
  applyFilters();

  showTooltip('📅 '+date+'\n'+dayLogs.length+'건 · '+total.toFixed(1)+'h\n👤 '+memberNames+'\n🏷 '+catNames);
}

// ─── THIS WEEK WIDGET ───
async function renderWeekWidget() {
  const now = new Date();
  const mon = new Date(now); mon.setDate(now.getDate()-now.getDay()+1);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const start = dateToStr(mon);
  const end = dateToStr(sun);

  let weekLogs = [], weekAttends = [];
  try {
    const [logsRes, attendsRes] = await Promise.all([
      fetch(`${API}/work_logs?log_date=gte.${start}&log_date=lte.${end}&select=employee_id,hours`,{headers:H}),
      fetch(`${API}/attends?start_date=lte.${end}&end_date=gte.${start}&select=employee_id,exclude_hours`,{headers:H})
    ]);
    weekLogs = await logsRes.json();
    weekAttends = await attendsRes.json();
  } catch(e) {
    weekLogs = allLogs.filter(l=>l.log_date>=start&&l.log_date<=end);
  }

  const byMember = {};
  allEmployees.forEach(e=>byMember[e.id]={name:e.name,hours:0});
  weekLogs.forEach(l=>{if(byMember[l.employee_id])byMember[l.employee_id].hours+=Number(l.hours);});
  // 근태 시간 합산 (연차 등 제외 시간을 공수로 포함)
  weekAttends.forEach(function(a){if(byMember[a.employee_id])byMember[a.employee_id].hours+=Number(a.exclude_hours||0);});

  const weekGoal = monthGoal/4;
  const sorted = Object.values(byMember).sort((a,b)=>b.hours-a.hours);

  document.getElementById('week-widget').innerHTML = sorted.map((v,i)=>{
    const pct = Math.min(v.hours/weekGoal*100,100);
    const color = pct>=80?'#ff4757':pct>=60?'#ffa502':'#00d4ff';
    return `<div class="week-member-row">
      <div class="week-member-name" style="color:${COLORS[i%COLORS.length]}">${v.name}</div>
      <div class="week-bar-wrap">
        <div class="week-bar-bg">
          <div class="week-bar-fill" style="width:${pct}%;background:${color}20;border:1px solid ${color}40">
          </div>
          <div class="week-bar-goal" style="left:${Math.min(weekGoal/weekGoal*100,100)}%"></div>
        </div>
      </div>
      <div class="week-member-val" style="color:${color}">${v.hours.toFixed(1)}h</div>
    </div>`;
  }).join('') + `<div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:center">${start} ~ ${end} · 주간 목표 ${weekGoal.toFixed(0)}h/인</div>`;
}

// ─── MONTHLY TREND ───
async function renderMonthlyTrend() {
  const now = new Date();
  const months = [];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }

  let monthlyData = months.map(()=>0);
  try {
    const start = months[0]+'-01';
    const last = months[months.length-1];
    const [y,m] = last.split('-');
    const end = `${y}-${m}-${new Date(y,m,0).getDate()}`;
    const res = await fetch(`${API}/work_logs?log_date=gte.${start}&log_date=lte.${end}&select=log_date,hours`,{headers:H});
    const logs = await res.json();
    logs.forEach(l=>{
      const ym = l.log_date.slice(0,7);
      const idx = months.indexOf(ym);
      if(idx>=0) monthlyData[idx]+=Number(l.hours);
    });
  } catch(e) {
    monthlyData = months.map((_,i)=>Math.floor(Math.random()*200+100));
  }

  const labels = months.map(m=>{const[y,mo]=m.split('-');return `${mo}월`;});
  destroyChart('chart-monthly');
  charts['chart-monthly'] = new Chart(document.getElementById('chart-monthly'),{
    type:'bar',
    data:{labels,datasets:[{
      label:'월 총 공수',data:monthlyData,
      backgroundColor:months.map(m=>{const s=document.getElementById('date-start').value||'';return s.startsWith(m)?'rgba(0,255,157,0.6)':'rgba(0,212,255,0.3)';}),
      borderColor:months.map(m=>{const s=document.getElementById('date-start').value||'';return s.startsWith(m)?'#00ff9d':'#00d4ff';}),
      borderWidth:2,borderRadius:6
    }]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toFixed(1)}h`}}},
      scales:{x:{grid:{display:false},ticks:{color:cc().tick,font:{size:10}}},
              y:{grid:{color:cc().grid},ticks:{color:cc().tick,font:{size:10}},beginAtZero:true}}}
  });
}

// ─── UTILS ───
function destroyChart(id) {
  if(charts[id]){charts[id].destroy();delete charts[id];}
}

let tooltipTimer;
function showTooltip(msg) {
  const t = document.getElementById('custom-tooltip');
  t.textContent = msg; t.style.display='block';
  t.style.left='50%'; t.style.top='50%'; t.style.transform='translate(-50%,-50%)';
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(()=>t.style.display='none', 2000);
}

// ─── CHART THEME COLORS ───
function cc() {
  const mac = document.documentElement.getAttribute('data-theme') === 'mac';
  return {
    tick:        mac ? 'rgba(0,0,0,0.55)'  : '#7aa8d4',
    tickStrong:  mac ? 'rgba(0,0,0,0.82)'  : '#e8f4ff',
    grid:        mac ? 'rgba(0,0,0,0.07)'  : 'rgba(255,255,255,0.05)',
    gridR:       mac ? 'rgba(0,0,0,0.10)'  : 'rgba(255,255,255,0.08)',
    legend:      mac ? 'rgba(0,0,0,0.55)'  : '#7aa8d4',
    radarTick:   mac ? 'rgba(0,0,0,0.35)'  : 'rgba(255,255,255,0.3)',
    radarPoint:  mac ? 'rgba(0,0,0,0.65)'  : '#7aa8d4',
    planBar:     mac ? 'rgba(0,0,0,0.08)'  : 'rgba(255,255,255,0.08)',
    planBorder:  mac ? 'rgba(0,0,0,0.20)'  : 'rgba(255,255,255,0.2)',
  };
}
function applyChartDefaults() {
  const mac = document.documentElement.getAttribute('data-theme') === 'mac';
  Chart.defaults.color = mac ? 'rgba(0,0,0,0.55)' : '#7aa8d4';
  Chart.defaults.borderColor = mac ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.05)';
}

// Chart.js global defaults
applyChartDefaults();
Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

// ─── PDF EXPORT ───
async function exportDashboardPDF() {
  const btn = document.getElementById('pdf-btn');
  const origText = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '⏳ 생성 중...'; btn.disabled = true; }

  try {
    // 1. 캡처 대상: 헤더 제외하고 필터바 + 메인 콘텐츠만
    const target = document.getElementById('db-capture-root');

    // 2. 캔버스 max-height 임시 해제 (차트가 잘리지 않도록)
    const canvasList = target.querySelectorAll('canvas');
    const origMaxH = [];
    canvasList.forEach(function(c) {
      origMaxH.push(c.style.maxHeight);
      c.style.maxHeight = 'none';
    });

    // 3. 스크롤 top으로
    window.scrollTo(0, 0);

    // 4. html2canvas 캡처
    const canvas = await html2canvas(target, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#0a1628',
      logging: false,
      width: target.scrollWidth,
      height: target.scrollHeight,
      windowWidth: target.scrollWidth,
      windowHeight: target.scrollHeight,
      scrollX: 0,
      scrollY: 0,
      onclone: function(cloneDoc) {
        // 클론 내 모든 캔버스 max-height 제거
        cloneDoc.querySelectorAll('canvas').forEach(function(c){ c.style.maxHeight='none'; });
        // sticky 해제
        cloneDoc.querySelectorAll('.filter-bar,.active-filter-bar').forEach(function(el){
          el.style.position='static';
        });
      }
    });

    // 5. 캔버스 복원
    canvasList.forEach(function(c, i){ c.style.maxHeight = origMaxH[i]; });

    // 6. jsPDF 생성 (A4 landscape)
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    const pW = pdf.internal.pageSize.getWidth();   // 297mm
    const pH = pdf.internal.pageSize.getHeight();  // 210mm

    const imgW = pW;
    const imgH = (canvas.height / canvas.width) * imgW;
    const imgData = canvas.toDataURL('image/jpeg', 0.92);

    if (imgH <= pH) {
      // 한 페이지에 들어오는 경우
      pdf.addImage(imgData, 'JPEG', 0, 0, imgW, imgH);
    } else {
      // 여러 페이지로 분할
      const totalPages = Math.ceil(imgH / pH);
      for (let p = 0; p < totalPages; p++) {
        if (p > 0) pdf.addPage();
        // y 오프셋: 각 페이지마다 이미지를 위로 당겨서 해당 구간이 보이게
        const yOffset = -(p * pH);
        pdf.addImage(imgData, 'JPEG', 0, yOffset, imgW, imgH);
        // 페이지 밖 영역을 흰/다크 사각형으로 가리기
        if (yOffset + imgH > pH) {
          pdf.setFillColor(10, 22, 40);
          pdf.rect(0, pH, pW, imgH, 'F');
        }
      }
    }

    // 7. 저장
    const start = document.getElementById('date-start').value || '';
    const end   = document.getElementById('date-end').value   || '';
    pdf.save('공수대시보드' + (start ? '_'+start+'~'+end : '') + '.pdf');

  } catch(e) {
    console.error(e);
    alert('PDF 생성 실패: ' + e.message);
  }

  if (btn) { btn.innerHTML = origText; btn.disabled = false; }
}
