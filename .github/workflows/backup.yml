name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Supabase tables
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          mkdir -p backups/$DATE
          SUPABASE_URL="https://uulemznemzjlgzqhrchb.supabase.co"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bGVtem5lbXpqbGd6cWhyY2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTc3MzQsImV4cCI6MjA5Mzk5MzczNH0.cy3jWrFez0pO0vl3nOOUMiv-511IzQiTcNxTK8Jejrg"
          for TABLE in todos employees categories notices attends; do
            curl -s "${SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=5000" \
              -H "apikey: ${KEY}" \
              -H "Authorization: Bearer ${KEY}" \
              -o backups/$DATE/${TABLE}.json
          done

      - name: Commit and push
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet && echo "skip" || (git commit -m "backup: $DATE" && git push)
