name: Todo Change Logger

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  log-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch todos from Supabase
        run: |
          SUPABASE_URL="https://uulemznemzjlgzqhrchb.supabase.co"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bGVtem5lbXpqbGd6cWhyY2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTc3MzQsImV4cCI6MjA5Mzk5MzczNH0.cy3jWrFez0pO0vl3nOOUMiv-511IzQiTcNxTK8Jejrg"
          curl -s "${SUPABASE_URL}/rest/v1/todos?select=*&limit=5000" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" \
            -o /tmp/current.json
          curl -s "${SUPABASE_URL}/rest/v1/employees?select=id,name" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" \
            -o /tmp/employees.json

      - name: Detect and log changes
        run: python3 .github/scripts/log_changes.py

      - name: Delete logs older than 7 days
        run: python3 .github/scripts/cleanup_logs.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet && echo "skip" || (git commit -m "log: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')" && git push)
