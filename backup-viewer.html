<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>변경 이력 조회</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;padding:24px}
  h1{font-size:20px;font-weight:700;margin-bottom:20px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  select{padding:8px 12px;border-radius:8px;border:1px solid #d2d2d7;font-size:14px;background:#fff;cursor:pointer}
  input{padding:8px 12px;border-radius:8px;border:1px solid #d2d2d7;font-size:14px;background:#fff;width:200px}
  .count{font-size:13px;color:#6b7280}

  .time-block{margin-bottom:16px}
  .time-label{font-size:12px;font-weight:700;color:#6b7280;margin-bottom:6px;padding-left:4px}
  .entry{display:flex;align-items:flex-start;gap:10px;background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .action-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .added  {background:#d1fae5;color:#065f46}
  .deleted{background:#fee2e2;color:#991b1b}
  .modified{background:#dbeafe;color:#1e40af}
  .entry-body{flex:1}
  .entry-title{font-size:14px;font-weight:600;margin-bottom:2px}
  .entry-meta{font-size:12px;color:#6b7280}
  .entry-detail{font-size:12px;color:#4b5563;margin-top:3px}

  .empty{text-align:center;padding:60px;color:#9ca3af;font-size:14px}
  .loading{text-align:center;padding:60px;color:#6b7280;font-size:14px}
  .summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .summary-chip{font-size:12px;padding:4px 10px;border-radius:8px;font-weight:600}
</style>
</head>
<body>
<h1>📋 투두 변경 이력</h1>

<div class="top">
  <select id="date-select" onchange="loadLog()"><option>날짜 불러오는 중...</option></select>
  <input type="text" id="search" placeholder="투두 제목 / 담당자 검색" oninput="render()">
  <span class="count" id="count"></span>
</div>
<div class="summary" id="summary"></div>
<div id="content" class="loading">불러오는 중...</div>

<script>
const REPO = 'lsw6739-droid/worklog';
const BRANCH = 'main';
let logData = [];

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function init(){
  try{
    const files = await fetchJSON(`https://api.github.com/repos/${REPO}/contents/logs`);
    const dates = files
      .filter(f => f.name.match(/^\d{4}-\d{2}-\d{2}\.json$/))
      .map(f => f.name.replace('.json',''))
      .sort().reverse();
    if(!dates.length){
      document.getElementById('content').innerHTML='<div class="empty">아직 기록된 이력이 없습니다<br><small>30분마다 자동으로 변경 사항이 기록됩니다</small></div>';
      return;
    }
    const sel = document.getElementById('date-select');
    sel.innerHTML = dates.map(d=>`<option value="${d}">${d}</option>`).join('');
    loadLog();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty">⚠️ 불러오기 실패<br><small>logs/ 폴더가 아직 없을 수 있습니다</small></div>';
  }
}

async function loadLog(){
  const date = document.getElementById('date-select').value;
  if(!date) return;
  document.getElementById('content').innerHTML='<div class="loading">불러오는 중...</div>';
  document.getElementById('summary').innerHTML='';
  try{
    const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/logs/${date}.json`;
    logData = await fetchJSON(url);
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty">이 날짜의 이력이 없습니다</div>';
  }
}

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();

  let added=0, deleted=0, modified=0;
  const blocks = [];

  logData.forEach(block=>{
    const filtered = block.changes.filter(c=>{
      if(!q) return true;
      return (c.title||'').toLowerCase().includes(q) || (c.employee||'').toLowerCase().includes(q);
    });
    if(filtered.length){
      blocks.push({time: block.time, changes: filtered});
      filtered.forEach(c=>{
        if(c.action==='added') added++;
        else if(c.action==='deleted') deleted++;
        else modified++;
      });
    }
  });

  const total = added+deleted+modified;
  document.getElementById('count').textContent = `총 ${total}건`;
  document.getElementById('summary').innerHTML = total
    ? `<span class="summary-chip added">➕ 추가 ${added}</span>
       <span class="summary-chip deleted">🗑 삭제 ${deleted}</span>
       <span class="summary-chip modified">✏️ 수정 ${modified}</span>`
    : '';

  if(!blocks.length){
    document.getElementById('content').innerHTML='<div class="empty">변경 이력이 없습니다</div>';
    return;
  }

  const ACTION_LABEL = {added:'추가', deleted:'삭제', modified:'수정'};

  document.getElementById('content').innerHTML = blocks.map(block=>`
    <div class="time-block">
      <div class="time-label">🕐 ${block.time}</div>
      ${block.changes.map(c=>`
        <div class="entry">
          <span class="action-badge ${c.action}">${ACTION_LABEL[c.action]||c.action}</span>
          <div class="entry-body">
            <div class="entry-title">${esc(c.title)}</div>
            <div class="entry-meta">👤 ${esc(c.employee)}</div>
            ${c.detail ? `<div class="entry-detail">${esc(c.detail)}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
